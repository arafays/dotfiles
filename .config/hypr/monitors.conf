# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Monitor configuration based on hyprctl monitors output
# DP-1: HP E231 (1920x1080) at 0x0
# DP-2: Dell U2412M (1920x1200) at 1920x0
monitor = DP-1, 1920x1080@60, 0x0, 1
monitor = DP-2, 1920x1200@59.95, 1920x0, 1

# Workspace rules
# Workspace 1: Terminal on DP-1
workspace = 1, monitor:DP-1

# Workspace 2: Chromium on DP-2 (autostart if empty)
workspace = 2, monitor:DP-2, on-created-empty:chromium

# Workspace 3: Slack (autostart if empty)
workspace = 3, monitor:DP-1, on-created-empty:slack

# Workspace 4 and 5: on DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
