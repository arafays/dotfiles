# Intel Graphics Renderer Optimizations
# Add these settings for better Intel GPU performance

# Renderer settings for Intel iGPU
render {
    explicit_sync = 1
    explicit_sync_kms = 1
    direct_scanout = true
}

# OpenGL settings optimized for Intel
opengl {
    nvidia_anti_flicker = false
    force_introspection = 0
}

# Miscellaneous optimizations
misc {
    vfr = true
    vrr = 0
    no_direct_scanout = false
}
