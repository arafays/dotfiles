windowrule {
  name = windowrule-1
  float = on
  match:title = ^(Open)$
}
windowrule {
  name = windowrule-2
  float = on
  match:title = ^(Choose Files)$
}
windowrule {
  name = windowrule-3
  float = on
  match:title = ^(Save As)$
}
windowrule {
  name = windowrule-4
  float = on
  match:title = ^(Confirm to replace files)$
}
windowrule {
  name = windowrule-5
  float = on
  match:title = ^(File Operation Progress)$
}
windowrule {
  name = windowrule-6
  float = on
  match:class = ^(xdg-desktop-portal-gtk)$
}
# chrome-based browsers devtools
windowrule {
  name = windowrule-7
  float = on
  match:class = ^([Cc]hromium|Google-chrome|Brave-browser|Microsoft-edge|Vivaldi|Opera)$
  match:title = ^(Developer Tools|DevTools)
}
# Android Development - Modern Hyprland syntax
# Android Emulator - make it floating with proper size and position
windowrulev2 = float, class:^(Emulator)$
windowrulev2 = noanim, class:^(Emulator)$
windowrulev2 = noblur, class:^(Emulator)$
windowrulev2 = noshadow, class:^(Emulator)$
windowrulev2 = pin, class:^(Emulator)$
windowrulev2 = opacity 1.0 override, class:^(Emulator)$

# Android Studio - IDE should tile but dialogs float
windowrulev2 = float, class:^(jetbrains-studio)$, title:^(.*Dialog.*)$
windowrulev2 = float, class:^(jetbrains-studio)$, title:^(Welcome to Android Studio)$
windowrulev2 = float, class:^(jetbrains-studio)$, title:^(Import Project)$
windowrulev2 = float, class:^(jetbrains-studio)$, title:^(Create New Project)$

# Android Studio AVD Manager
windowrulev2 = float, class:^(jetbrains-studio)$, title:^(AVD Manager)$
windowrulev2 = center, class:^(jetbrains-studio)$, title:^(AVD Manager)$


