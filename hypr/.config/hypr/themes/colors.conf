exec = gsettings set org.gnome.desktop.interface gtk-theme 'Wallbash-Gtk'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

general {
    col.active_border = rgba(E1E0E5ff) rgba(1A1A1Aff) 45deg
    col.inactive_border = rgba(171616ff) rgba(704F5Eff) 45deg
}

group {
    col.border_active = rgba(E1E0E5ff) rgba(1A1A1Aff) 45deg
    col.border_inactive = rgba(171616cc) rgba(704F5Ecc) 45deg
    col.border_locked_active = rgba(B5BDBAff) rgba(050505ff) 45deg
    col.border_locked_inactive = rgba(FFFFFFcc) rgba(FFFFFFcc) 45deg
}
