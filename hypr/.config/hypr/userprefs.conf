# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2


workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-2, on-created-empty:chromium --restore-last-session
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = special, monitor:DP-1


windowrulev2 = opacity 0.90 0.90,class:^(Chromium|chromium)$
windowrulev2 = opacity 0.90 0.90,class:^([zZ]en-browser)$


windowrulev2 = float,class:^(zen-browser)$,title:^(Picture-in-Picture)$
windowrulev2 = float,class:^(zen-browser)$,title:^(Library)$
windowrulev2 = float,title:^(About Mozilla Firefox)$
