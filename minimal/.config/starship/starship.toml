# "$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 100
palette = "oxocarbon"
add_newline = true

format = """
[╭](fg:separator)󰣇 $directory $git_branch$git_commit$git_state $git_status$fill$all$cmd_duration$line_break\
[╰](fg:separator)$character
"""
continuation_prompt = '▶▶ '


[palettes.oxocarbon]
black = "#161616"
red = "#ee5396"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
magenta = "#be95ff"
cyan = "#3ddbd9"
white = "#dde1e6"
icon = "#161616"
status = "#e23140"

prompt_ok = "#42be65"
prompt_err = "#e23140"

separator = "#45475A"

background = "#262626"
git_branch = "#ffe97b"

directory = "#dde1e6"
duration = "#ee5396"

[hostname]
ssh_only = true
ssh_symbol = " "
format = ' on [$hostname](bold yellow) '
trim_at = "."
disabled = false

[character]
success_symbol = "[❯](fg:prompt_ok)"
error_symbol = "[❯](fg:prompt_err)"

[status]
format = "[$status](fg:status) "
pipestatus = true
pipestatus_segment_format = "$status"
pipestatus_format = "[$pipestatus](fg:status) "
disabled = false
pipestatus_separator = "-"

[directory]
read_only = " 󰌾"
truncate_to_repo = false # truncates directory to root folder if in github repo
truncation_length = 3
truncation_symbol = "…/"

[cmd_duration]
min_time = 4
show_milliseconds = false

# [time]
# disabled = true
# time_format = "%H: %M :%S"

[git_branch]
symbol = " "

[git_status]
stashed = ' [ ${count}](blue)'
modified = ' [ ${count}](yellow)'
ahead = ' [ ${count}](green)'
diverged = ' [ ⇡${ahead_count}(green) ⇣${behind_count}(red)](bold purple)'
behind = ' [ ${count}](red)'
staged = ' [ ${count}](green)'
untracked = ' [ ${count}](red)'

[git_commit]
tag_symbol = '  '

