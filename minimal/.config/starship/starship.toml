# "$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 100
palette = "oxocarbon"
add_newline = true

format = """
[в•ӯ](fg:separator)у°ЈҮ $directory $git_branch$git_commit$git_state $git_status$fill$all$cmd_duration$line_break\
[в•°](fg:separator)$character
"""
continuation_prompt = 'в–¶в–¶ '

[palettes.oxocarbon]
black = "#161616"
red = "#ee5396"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
magenta = "#be95ff"
cyan = "#3ddbd9"
white = "#dde1e6"
icon = "#161616"
status = "#e23140"

prompt_ok = "#42be65"
prompt_err = "#e23140"

separator = "#45475A"

background = "#262626"
git_branch = "#ffe97b"

directory = "#dde1e6"
duration = "#ee5396"

[hostname]
ssh_only = true
ssh_symbol = "о¬Ғ "
format = ' on [$hostname](bold yellow) '
trim_at = "."
disabled = false

[character]
success_symbol = "[вқҜ](fg:prompt_ok)"
error_symbol = "[вқҜ](fg:prompt_err)"

[status]
format = "[$status](fg:status) "
pipestatus = true
pipestatus_segment_format = "$status"
pipestatus_format = "[$pipestatus](fg:status) "
disabled = false
pipestatus_separator = "-"

[directory]
read_only = " у°Ңҫ"
truncate_to_repo = false # truncates directory to root folder if in github repo
truncation_length = 3
truncation_symbol = "вҖҰ/"

[cmd_duration]
min_time = 4
show_milliseconds = false

# [time]
# disabled = true
# time_format = "%H: %M :%S"

[git_branch]
symbol = "пҗҳ "

[git_status]
stashed = ' [пҒ© ${count}](blue)'
modified = ' [п‘ҷ ${count}](yellow)'
ahead = ' [пҒў ${count}](green)'
diverged = ' [п‘ҝ вҮЎ${ahead_count}(green) вҮЈ${behind_count}(red)](bold purple)'
behind = ' [пҒЈ ${count}](red)'
staged = ' [пҒ§ ${count}](green)'
untracked = ' [п„Ё ${count}](red)'

[git_commit]
tag_symbol = ' пҗ’ '

