[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[window]
dynamic_padding = true
decorations = "full"
opacity = 0.95
decorations_theme_variant = "Dark"

[scrolling]
history = 10000
multiplier = 3

