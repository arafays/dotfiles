# Chromium Flags Configuration
# Arch Linux + Wayland (Niri) - Intel HD Graphics 630 (Kaby Lake, Gen9.5)
#
# VA-API driver: iHD (intel-media-driver) - installed
# Debug:  chrome://gpu            -> "Video Decode: Hardware accelerated"
# Verify: chrome://media-internals -> Player Properties: video_decoder = GpuVideoDecoder
#          (install libva-utils and run `vainfo` to confirm the driver loads)

# --- GPU blocklist override (HD 630 is blocklisted for VA-API/WebGL) ---
--ignore-gpu-blocklist
--disable-gpu-driver-bug-workaround

# --- Native Wayland (Ozone) backend ---
--ozone-platform=wayland

# --- GL/ANGLE backend: fixes blank-white-video on Wayland; required pairing for VA-API ---
--use-gl=angle
--use-angle=gl

# --- GPU rasterization ---
--enable-gpu-rasterization

# --- VA-API hardware video decode (EGL/Wayland GL path) ---
# VaapiVideoDecoder is default-enabled since Chromium 143, so not listed here.
# AcceleratedVideoDecodeLinuxGL wires it into the Linux GL compositing path
# (replaces the pre-131 VaapiVideoDecodeLinuxGL flag); ZeroCopyGL avoids extra
# copies on EGL/Wayland. Encoder enables VA-API encode.
--enable-features=AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL,AcceleratedVideoEncoder
