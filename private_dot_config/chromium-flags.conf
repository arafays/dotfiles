# Chromium Flags Configuration
# Arch Linux + Wayland (Niri) - June 2026
#
# Flags based on Arch Wiki & chrome://gpu analysis:
#   GPU: Intel HD Graphics 630 (KBL GT2), Mesa 26.1.1
#   Chrome 148 — TouchpadOverscrollHistoryNavigation is default

# Auto-detect Wayland (preferred in Wayland sessions, no need for explicit ozone)
--ozone-platform-hint=auto

# Enable Wayland native window decorations (default on Chrome 148+ but explicit)
--enable-features=WaylandWindowDecorations

# Enable Wayland Input Method Editor for proper IME support
--enable-wayland-ime

# Disable Vulkan to fix CompoundImageBacking/Skia errors on Wayland + Intel KBL GT2.
# Vulkan shared images are incompatible with Wayland's Skia rendering pipeline,
# causing WebGL/Canvas (e.g. Theatre.js) to silently fail with white placeholders.
--disable-vulkan
