# Chromium Flags Configuration
# Arch Linux + Wayland (Niri) - Intel HD Graphics 630
#
# WebGPU is not enabled by default on Intel Gen9 GPUs (HD 630 is KBL GT2, Gen9).
# These flags enable it via Vulkan backend.
#
# Debug: chrome://gpu — check WebGPU reads "Hardware accelerated"
# Test:  await navigator.gpu.requestAdapter() in DevTools console
#
# If adapter is still null, uncomment the escalation flags below.

# --- WebGPU ---
--enable-unsafe-webgpu
--enable-features=Vulkan

# --- Escalation (uncomment if WebGPU still fails) ---
# --ignore-gpu-blocklist
# --force-high-performance-gpu

