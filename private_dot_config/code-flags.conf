# VS Code Flags Configuration
# Arch Linux + Wayland (Niri/Hyprland) - Feb 2026
#
# VS Code uses its own flags file: code-flags.conf
# This provides native Wayland support and performance optimizations
#
# Note: Electron apps combine --enable-features/--disable-features values with commas

# --- Wayland Native Rendering ---
# Use Wayland platform (VS Code uses its own logic, explicit setting works better)
--ozone-platform=wayland

# Enable native Wayland window decorations and touchpad overscroll gestures
--enable-features=WaylandWindowDecorations,TouchpadOverscrollHistoryNavigation

# Enable Wayland Input Method Editor support
--enable-wayland-ime

# --- Performance ---
# Use GTK4 for better Wayland integration and modern look
--gtk-version=4

# Enable GPU rasterization
--enable-gpu-rasterization

# Ignore GPU blocklist for better hardware acceleration
--ignore-gpu-blocklist

# --- Security ---
# Use GNOME keyring/libsecret for secure password storage
--password-store=gnome-libsecret

# --- Workarounds ---
# Disable Wayland color manager if experiencing color issues
--disable-features=WaylandWpColorManagerV1
