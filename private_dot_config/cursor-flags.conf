# Cursor IDE Flags Configuration
# Arch Linux + Wayland (Niri) - Intel HD Graphics 630 (Gen9)
#
# Read by /usr/bin/cursor (cursor-bin AUR package).
# Format: one flag per line, # for comments.
#
# Wayland flags are NOT duplicated here — Cursor's launcher already
# falls back to electron-flags.conf (managed) which provides:
#   --ozone-platform-hint=auto, WaylandWindowDecorations,
#   --enable-wayland-ime, --wayland-text-input-version=3
#
# This file adds only Cursor-specific + Intel GPU flags.

# --- Intel GPU (Gen9 is blocklisted, force-enable acceleration) ---
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-native-gpu-memory-buffers
--use-gl=egl

# --- Fix blurry text with fractional scaling (uncomment if needed) ---
# --disable-features=WaylandFractionalScaleV1

# --- Escalation (uncomment if Cursor UI freezes or blank window) ---
# --disable-gpu-sandbox
# --disable-gpu
