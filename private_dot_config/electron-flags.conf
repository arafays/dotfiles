
# Electron Flags Configuration
# Arch Linux + Wayland (Niri/Hyprland) - Feb 2026
#
# Latest recommended flags for Electron apps on Wayland
# This file is read by Electron-based applications
#
# Note: Electron apps combine --enable-features/--disable-features values with commas

# --- Wayland Native Rendering ---
# Auto-detect Wayland and use it when available
--ozone-platform-hint=auto
--ozone-platform=wayland

# Enable native Wayland decorations, overscroll gestures, VAAPI decoder, and color picker
--enable-features=WaylandWindowDecorations,TouchpadOverscrollHistoryNavigation,VaapiVideoDecoder,ColorPickerPortal

# Enable Wayland Input Method Editor for proper IME support
--enable-wayland-ime

# --- Performance ---
# Enable GPU rasterization for better performance
--enable-gpu-rasterization

# Enable hardware-accelerated video decode
--enable-accelerated-video-decode

# Ignore GPU blocklist to use hardware acceleration on more systems
--ignore-gpu-blocklist

# --- Workarounds ---
# Disable Wayland color manager to prevent color profile issues
--disable-features=WaylandWpColorManagerV1

--wayland-text-input-version=3

--gtk-version=5
