MISE_DATA_DIR="$XDG_DATA_HOME/mise"
MISE_CACHE_DIR="$XDG_CACHE_HOME/mise"
MISE_CONFIG_FILE="$XDG_CONFIG_HOME/mise/config.toml"

# Make mise-managed tools available in non-interactive shells and systemd services
# that inherit environment.d. Interactive shells also activate mise via shell hooks.
PATH="$MISE_DATA_DIR/shims:$PATH"
