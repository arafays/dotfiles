onboarding = false

[theme]
name = "vesper"
auto_switch = false

[terminal]
default_shell = "fish"
shell_mode = "non_login"
new_cwd = "follow"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
prompt_new_tab_name = false
# mouse_capture = true  # default true
# copy_on_select = true  # default true

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[keys]
# Prefix
prefix = "ctrl+b"

# Navigate mode: workspace switching without arrow keys (60% friendly)
navigate_workspace_up = "["
navigate_workspace_down = "]"

# Pane navigation (prefix + vim keys + ctrl+alt direct)
focus_pane_left = ["prefix+h", "ctrl+alt+h"]
focus_pane_down = ["prefix+j", "ctrl+alt+j"]
focus_pane_up = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]

# Tab switching
previous_tab = ["prefix+p", "ctrl+alt+["]
next_tab = ["prefix+n", "ctrl+alt+]"]

# Agent switching
previous_agent = ["prefix+,", "ctrl+alt+,"]
next_agent = ["prefix+.", "ctrl+alt+."]

# Split shortcuts
split_vertical = ["prefix+v", "ctrl+alt+d"]
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"]

# Zoom
zoom = ["prefix+z", "ctrl+alt+z"]

# Workspace navigation
workspace_picker = "prefix+w"
goto = "prefix+g"

# === Custom command keybindings ===

# Lazygit - git TUI
[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
description = "lazygit"
width = "90%"
height = "90%"

# Lazydocker - docker TUI
[[keys.command]]
key = "prefix+alt+d"
type = "popup"
command = "lazydocker"
description = "lazydocker"
width = "90%"
height = "90%"

# Yazi - file manager
[[keys.command]]
key = "prefix+alt+y"
type = "popup"
command = "yazi"
description = "yazi"
width = "90%"
height = "90%"

# Btop - system monitor
[[keys.command]]
key = "prefix+alt+b"
type = "popup"
command = "btop"
description = "btop"
width = "80%"
height = "80%"



[ui.sound]
enabled = true

[worktrees]
directory = "~/.herdr/worktrees"

[experimental]
pane_history = false
