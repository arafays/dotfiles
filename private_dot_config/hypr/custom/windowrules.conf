#!/usr/bin/env hyprlang
# Hyprland Window Rules Configuration
# See: https://wiki.hypr.land/Configuring/Window-Rules/
#
# Syntax: windowrule = RULE, WINDOW
#         windowrulev2 = RULE, WINDOW
#
# Rules are processed from top to bottom - order matters!
# Use `hyprctl clients` to inspect window properties

#######################
### GLOBAL SETTINGS ###
#######################

# General window behavior
windowrule = nofocus, title:^$
layerrule = noanim, selection

# XWayland optimization
windowrule = bordersize 0, xwayland:1 floating:1
windowrule = noblur, class:^()$, title:^()$

#########################
### SYSTEM COMPONENTS ###
#########################

# Screen management
windowrule = fullscreen, class:^(Screensaver)$

# File dialogs (universal patterns)
windowrule = float, title:^(Open.*Files?.*|Choose.*Files?.*|Save.*As.*|Select.*Folder.*)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = noblur, class:^(xdg-desktop-portal-gtk)$

# Hyprland system dialogs (ANR/Not Responding dialogs)
windowrule = float, class:^(hyprland-dialog)$
windowrule = center, class:^(hyprland-dialog)$
windowrule = pin, class:^(hyprland-dialog)$
windowrule = immediate, class:^(hyprland-dialog)$
windowrule = focusonactivate, class:^(hyprland-dialog)$
windowrule = size 600 200, class:^(hyprland-dialog)$

# Common dialog patterns
windowrule = float, title:^(File Operation Progress|Confirm to replace files|Properties|Preferences|Settings)$
windowrule = float, title:^(.*[Aa]pplication.*[Nn]ot.*[Rr]esponding.*|.*[Nn]ot.*[Rr]esponding.*)$
windowrule = float, title:^(.*[Dd]ialog.*|.*[Cc]onfirm.*|.*[Aa]lert.*|.*[Ww]arning.*|.*[Ee]rror.*)$
windowrule = center, title:^(.*[Aa]pplication.*[Nn]ot.*[Rr]esponding.*|.*[Nn]ot.*[Rr]esponding.*)$
windowrule = pin, title:^(.*[Aa]pplication.*[Nn]ot.*[Rr]esponding.*|.*[Nn]ot.*[Rr]esponding.*)$
windowrule = immediate, title:^(.*[Aa]pplication.*[Nn]ot.*[Rr]esponding.*|.*[Nn]ot.*[Rr]esponding.*)$
windowrule = focusonactivate, title:^(.*[Aa]pplication.*[Nn]ot.*[Rr]esponding.*|.*[Nn]ot.*[Rr]esponding.*)$

#######################
### FLOATING SYSTEM ###
#######################

# Floating window tags
windowrule = float, tag:floating-window
windowrule = center, tag:floating-window
windowrule = size 800 600, tag:floating-window

# Auto-tag floating applications
windowrule = tag +floating-window, class:^(blueberry.py|Impala|Wiremix|org.gnome.NautilusPreviewer|com.gabm.satty|About|TUI.float)$

#########################
### MEDIA APPLICATIONS ###
#########################

# VLC Media Player
windowrule = float, class:^(vlc)$
windowrule = opacity 1.0 override, class:^(vlc)$

# General media applications (no transparency)
windowrule = opacity 1.0 override, class:^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv)$

##########################
### BROWSER APPLICATIONS ###
##########################

# Firefox
windowrule = float, class:^(firefox)$, title:^(Picture-in-Picture|Firefox — Sharing Indicator|Save As|Open File|Library|About Mozilla Firefox)$

# Zen Browser - Base rules
windowrule = float, class:zen
windowrule = center, class:zen
windowrule = size 620 920, class:zen
windowrule = opacity 1.0 override, class:^([zZ]en)$
windowrule = bordersize 0, class:^([zZ]en)$

# Zen Browser - Floating dialogs
windowrule = float, class:^([zZ]en)$, title:^(About Zen Browser|Picture-in-Picture|Library)$
windowrule = float, class:^([zZ]en)$, title:^(Picture-in-Picture|Firefox — Sharing Indicator|Save As|Open File|Library|About Mozilla Firefox)$

#########################
### DEVELOPMENT TOOLS ###
#########################

# Terminal applications
windowrule = float, class:^(kitty)$, title:^(top|[bh]top|nvtop)$

# Code editors
windowrule = opacity 0.97, class:^([cC]ode.*)$

# Android Development
windowrule = float, class:^Emulator$
windowrule = noanim, class:^Emulator$
windowrule = noblur, class:^Emulator$
windowrule = nodim, class:^Emulator$
windowrule = noborder, class:^Emulator$
windowrule = noshadow, class:^Emulator$
windowrule = center, class:^Emulator$
windowrule = pin, class:^Emulator$

########################
### SYSTEM UTILITIES ###
########################

# System configuration tools
windowrule = float, class:^(kvantummanager|qt[56]ct|nwg-look|org.kde.ark)$
windowrule = float, class:^(org.pulseaudio.pavucontrol|blueman-manager|nm-.*|org.kde.polkit.*)$

# Authentication agents
windowrule = float, class:^(polkit.*|org.freedesktop.impl.portal.desktop..*)$
windowrule = opacity 0.9, class:^(polkit.*|org.freedesktop.impl.portal.desktop..*)$

# File managers
windowrule = noblur, class:^(org.kde.dolphin|org.gnome.Nautilus)$
windowrule = float, class:^(org.gnome.Nautilus|org.kde.dolphin)$

windowrule = float, title:^(Save As|Open File|.*Downloading.*|.*Downloads.*|.*History.*|.*Settings.*|.*Preferences.*)$

####################
### APPLICATIONS ###
####################
# Spotify
windowrule = opacity 0.95, class:^([Ss]potify)$
windowrule = workspace 3, class:^([Ss]potify)$

# Bitwarden Desktop (standalone app)
windowrule = noscreenshare, class:^(Bitwarden)$
windowrule = float, class:^(Bitwarden)$
windowrule = center, class:^(Bitwarden)$
windowrule = size 400 600, class:^(Bitwarden)$

# Discord
windowrule = opacity 0.95, class:^([Dd]iscord|[Vv]esktop)$
windowrule = workspace 4, class:^([Dd]iscord|[Vv]esktop)$

# Telegram
windowrule = opacity 0.95, class:^(org.telegram.desktop|telegram-desktop)$

#######################
### GAMING & GAMING ###
#######################

# Steam
windowrule = opacity 1.0 override, class:^([Ss]team|steamwebhelper)$

# Steam specific windows
windowrule = float, class:^([Ss]team)$, title:^(Friends List|Steam - News|Steam Settings|Create or select new Steam account|Steam Guard|^Steam$)$
windowrule = size 350 700, class:^([Ss]team)$, title:^(Friends List)$

# Steam games (general gaming rules)
windowrule = fullscreen, class:^(steam_app_\d+)$
windowrule = opacity 1.0 override, class:^(steam_app_\d+|gamescope|lutris|bottles|heroic|legendary)$
windowrule = immediate, class:^(steam_app_\d+|gamescope)$

# Wine/Proton applications
windowrule = opacity 1.0 override, class:^(wine|explorer.exe|winecfg.exe|.exe$)$

##########################
### OFFICE & PRODUCTIVITY ###
##########################

# LibreOffice
windowrule = opacity 1.0 override, class:^(libreoffice.*)$
windowrule = noblur, class:^(libreoffice.*)$

# PDF Viewers
windowrule = opacity 1.0 override, class:^(org.pwmt.zathura|evince|okular)$
windowrule = workspace 2, class:^(org.pwmt.zathura|evince|okular)$

# Image viewers/editors
windowrule = float, class:^(org.gnome.eog|gwenview|feh|sxiv|imv|gimp.*|inkscape)$
windowrule = center, class:^(org.gnome.eog|gwenview|feh|sxiv|imv)$
windowrule = opacity 1.0 override, class:^(gimp.*|inkscape|blender|krita)$

#######################
### SPECIAL WINDOWS ###
#######################

# Popup menus and tooltips
windowrule = noblur, class:^()$, title:^()$
windowrule = noblur, title:^(Menu)$
windowrule = float, title:^(Menu|wofi.*|rofi.*)$

# Picture-in-Picture windows (universal)
windowrule = float, title:^(Picture.in.Picture|Picture-in-Picture|PiP)$
windowrule = pin, title:^(Picture.in.Picture|Picture-in-Picture|PiP)$
windowrule = size 480 270, title:^(Picture.in.Picture|Picture-in-Picture|PiP)$

# Screen sharing indicators
windowrule = float, title:^(.*[Ss]haring [Ii]ndicator.*|.*[Ss]creen [Ss]hare.*)$
windowrule = move 100%-w-20 20, title:^(.*[Ss]haring [Ii]ndicator.*|.*[Ss]creen [Ss]hare.*)$
windowrule = pin, title:^(.*[Ss]haring [Ii]ndicator.*|.*[Ss]creen [Ss]hare.*)$

#########################
### WORKSPACE ASSIGNMENTS ###
#########################

# Development workspace (1)
# (Let most development tools float to default workspace)

# Media workspace (2)
# Already assigned above

# Music workspace (3)
# Already assigned above

# Communication workspace (4)
# Already assigned above

#######################
### DEBUG & TESTING ###
#######################

# Development and debug tools
windowrule = float, class:^(xeyes|xclock|xload)$
windowrule = size 300 200, class:^(xeyes|xclock|xload)$

# Temporary floating for testing
# windowrule = float, tag:test-float

######################
### LAYER RULES ###
######################

# Notification layer
layerrule = blur, notifications
layerrule = ignorealpha 0.69, notifications

# Waybar layer
layerrule = noanim, waybar
layerrule = blur, waybar
layerrule = ignorealpha 0.64, waybar

# Launcher/menu layer
layerrule = blur, launcher
layerrule = dimaround, launcher

# Lock screen layer
layerrule = blur, hyprlock
