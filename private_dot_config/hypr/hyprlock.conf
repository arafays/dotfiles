# Basic hyprlock config
background {
    monitor =
    path =
    color = 0xff1e1e2e
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = 0xff1e1e2e
    inner_color = 0xff1e1e2e
    font_color = 0xffcdd6f4
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi there, $USER
    color = 0xffcdd6f4
    font_size = 25
    font_family = Noto Sans
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = 0xffcdd6f4
    font_size = 20
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}