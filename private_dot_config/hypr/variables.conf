###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty

####################################
### FILE MANAGER CONFIGURATIONS ###
####################################

# === THUNAR FILE MANAGER (CURRENT - ACTIVE) ===
# Thunar with proper environment for better application discovery
$fileManager = dolphin

# === KDE DOLPHIN WITH FULL ENVIRONMENT (COMMENTED OUT) ===
# Uncomment this to switch back to KDE integration
# $fileManager = env XDG_CURRENT_DESKTOP=Hyprland KDE_SESSION_VERSION=6 KDE_FULL_SESSION=true XDG_DATA_DIRS=/usr/local/share:/usr/share:$HOME/.local/share QT_QPA_PLATFORMTHEME=kde dolphin

# === MINIMAL DOLPHIN (COMMENTED OUT) ===
# Use this if environment variables cause issues
# $fileManager = dolphin

# === ALTERNATIVE FILE MANAGERS (COMMENTED OUT) ===
# Uncomment one of these if Dolphin continues to have issues
# $fileManager = thunar              # XFCE file manager
# $fileManager = nautilus            # GNOME file manager  
# $fileManager = pcmanfm             # Lightweight file manager
# $fileManager = nemo                # Cinnamon file manager

####################################
### APPLICATION LAUNCHER CONFIG ###
####################################

# === WOFI WITH PROPER ENVIRONMENT (CURRENT - ACTIVE) ===
# Ensures wofi can discover all installed applications
$menu = wofi --show drun

# === MINIMAL WOFI (COMMENTED OUT) ===
# Use this if environment variables cause launcher issues
# $menu = wofi --show drun

# === ALTERNATIVE LAUNCHERS (COMMENTED OUT) ===
# Uncomment one of these to test different launchers
# $menu = fuzzel                     # Wayland native launcher
# $menu = rofi -show drun            # Popular launcher (if installed)
# $menu = bemenu --fn "JetBrains Mono 12" --list 20 --tb "#1e1e2e" --tf "#cdd6f4" --fb "#1e1e2e" --ff "#cdd6f4" --nb "#1e1e2e" --nf "#cdd6f4" --hb "#89b4fa" --hf "#1e1e2e" --sb "#1e1e2e" --sf "#a6e3a1"

##########################
### TESTING SHORTCUTS ###
##########################

# Quickly switch between configurations by commenting/uncommenting sections above:
# 1. KDE Full Environment: Best integration, proper app discovery
# 2. Minimal: Fallback if environment variables cause issues  
# 3. Alternatives: Different apps if KDE apps don't work well
