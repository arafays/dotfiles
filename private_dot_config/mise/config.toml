[tools]
bun = "latest"
go = "latest"
node = "lts"
pnpm = "latest"
rust = "latest"
uv = "latest"

"npm:portless" = { version = "latest", minimum_release_age = "0s" }

"npm:vercel" = { version = "latest", minimum_release_age = "0s" }

"npm:vim-language-server" = "latest"
"npm:yaml-language-server" = "latest"
"npm:@ast-grep/napi" = "latest"
"npm:@biomejs/biome" = "latest"
"npm:prettier" = "latest"
"npm:neovim" = "latest"
"npm:agent-browser" = "latest"
supabase = "latest"
"npm:framework7-cli" = "latest"
"npm:cordova" = "latest"
"npm:@earendil-works/pi-coding-agent" = { version = "latest", minimum_release_age = "0s" }
"npm:command-code" = { version = "latest", minimum_release_age = "0s" }

aube = "latest"
"npm:impeccable" = { version = "latest", minimum_release_age = "0s" }

zig = "0.16.0"
rtk = "latest"
usage = "latest"
"github:can1357/oh-my-pi" = { version = "latest", minimum_release_age = "0s" }


[settings]
jobs = 4
always_keep_download = false
always_keep_install = false
experimental = true

[tasks.update-daily]
description = "Bump bleeding-edge npm tools to latest, then re-add managed chezmoi files"
run = [
  "mise upgrade --bump --minimum-release-age 0 npm:portless npm:command-code npm:impeccable npm:@opencode-ai/cli npm:@earendil-works/pi-coding-agent npm:prettier npm:@biomejs/biome npm:vercel npm:@ast-grep/napi npm:agent-browser npm:neovim npm:@native-sdk/cli github:can1357/oh-my-pi",
  "mise run sync-dotfiles",
]

[tasks.sync-dotfiles]
description = "Re-add all chezmoi-managed files so source stays in sync with live configs"
run = "chezmoi re-add"

[tool_alias]
node = "core:node"
python = "core:python"
