[settings]
jobs = 4
not_found_auto_install = true
always_keep_download = false
always_keep_install = false

[tools]
biome = "latest"
bun = "latest"
go = "latest"
java = "24"
node = "24"
pnpm = "latest"
python = "3.14"
rust = "latest"
usage = { version = "latest", minimum_release_age = "0s" }
uv = "latest"
rtk = "latest"

"npm:markdownlint-cli2" = "latest"
"npm:vim-language-server" = "latest"
"npm:yaml-language-server" = "latest"
"npm:@ast-grep/napi" = "latest"
"npm:@biomejs/biome" = "latest"
"npm:eas-cli" = "latest"
"npm:expo" = "latest"
"npm:firebase-tools" = "latest"
"npm:neovim" = "latest"
"npm:prettier" = "latest"
"cargo:create-tauri-app" = "latest"
"cargo:tauri-cli" = "^2"
"cargo:trunk" = "latest"
aube = "latest"

"github:can1357/oh-my-pi" = { version = "latest", minimum_release_age = "0s" }
"npm:impeccable" = { version = "latest", minimum_release_age = "0s" }
"npm:@earendil-works/pi-coding-agent" = { version = "latest", minimum_release_age = "0s" }
"npm:command-code" = { version = "latest", minimum_release_age = "0s" }
"npm:portless" = { version = "latest", minimum_release_age = "0s" }
"npm:vercel" = { version = "latest", minimum_release_age = "0s" }
"npm:agent-browser" = { version = "latest", npm_args = "--ignore-scripts=false" }
"npm:playwright" = { version = "latest", npm_args = "--ignore-scripts=false" }

[tasks.update-daily]
description = "Bump bleeding-edge npm tools to latest, then re-add managed chezmoi files"
run = [
  "mise upgrade --bump --minimum-release-age 0 npm:command-code npm:impeccable npm:@earendil-works/pi-coding-agent npm:vercel npm:agent-browser github:can1357/oh-my-pi",
  "chezmoi re-add",
]

[tool_alias]
node = "core:node"
python = "core:python"
