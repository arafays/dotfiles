env: Linux/Arch/Wayland/cachyos (niri)
shell: fish
secrets: gnome-keyring
pkg: [paru, mise]
editors: [vscode-insiders, nvim]
rules:
  - year is always 2026, use latest info
  - edit source files in chezmoi repo, not live configs
  - use mise for global tools (e.g. mise use -g npm:firebase-tools@latest)
  - never sudo — ask user for password commands
