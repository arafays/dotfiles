system:
  os: linux
  distro: arch
  session: uwsm
  window_manager: hyprland
  package_managers: ["yay", "pacman"]
shell:
  default: zsh
  aliases:
    grep: rg # grep is aliased to ripgrep
editors:
  primary: "vscode-insiders"
  secondary: "nvim"
terminal:
  primary: kitty
  secondary: alacritty
  multiplexer: tmux
dotfiles:
  manager: chezmoi
  notes: "Configs managed via chezmoi; prefer editing source in chezmoi repo.; ~/dotfiles/ is the folder for chezmoi"
tools:
  search: rg
  version_manager: mise
  docs:
    mise: "https://mise.jdx.dev/getting-started.html"
preferences:
  enforce_rg_over_grep: yes
  respect_user_aliases: yes
paths:
  zshrc: "~/.zshrc"
  tmux_conf: "~/.tmux.conf"
  mise_config: "~/.config/mise/config.toml"
  ripgreprc: "~/.ripgreprc"
commands:
  search_code: "rg -n --line-number --color=never <pattern> <path>"
notes:
  - "Agents must use rg instead of grep."
  - "Use mise for managing tools and installing globals npm packages"
  - "VS Code Insiders and Neovim are primary editors; tmux used for sessions."
  - "Python: use uv instead of pip."
  - "Naming: camelCase vars/functions; PascalCase types/classes; UPPER_SNAKE_CASE constants; files kebab-case (TS/JS) or snake_case (py)."
