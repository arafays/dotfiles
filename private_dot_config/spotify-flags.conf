# Spotify Flags Configuration
# Arch Linux + Wayland (Niri) - Intel HD Graphics 630 (Gen9)
#
# Read by /usr/bin/spotify (AUR spotify package).
# Format: one flag per line, # for comments.
#
# Spotify uses CEF (Chromium Embedded Framework).
# --ozone-platform=wayland explicitly forces Wayland, bypassing
# the auto-detection bug where DISPLAY being set forces X11.
#
# Debug: check if running native Wayland with:
#   cat /proc/$(pgrep -x spotify)/environ | tr '\0' '\n' | grep WAYLAND_DISPLAY

# --- Wayland Native ---
--enable-features=UseOzonePlatform,WaylandWindowDecorations
--ozone-platform=wayland
--enable-wayland-ime

# --- Intel GPU (Gen9 is blocklisted, force-enable acceleration) ---
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-oop-rasterization
--enable-zero-copy

# --- Escalation (uncomment if Spotify crashes or black-screens) ---
# --disable-gpu-compositing
# --no-zygote
