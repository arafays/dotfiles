# Spotify Flags Configuration
# Arch Linux + Wayland (Niri/Hyprland) - Feb 2026
#
# Spotify uses its own flags file: spotify-flags.conf
# This provides native Wayland support and fixes for Spotify specifically

# --- Wayland Native Rendering ---
# Use Wayland platform explicitly (Spotify works best with explicit setting)
--ozone-platform=wayland

# Enable native Wayland decorations, overscroll gestures, and VAAPI decoder
--enable-features=WaylandWindowDecorations,TouchpadOverscrollHistoryNavigation,VaapiVideoDecoder

# Enable Wayland Input Method Editor support
--enable-wayland-ime

# --- Performance ---
# Enable GPU rasterization
--enable-gpu-rasterization

# Ignore GPU blocklist for better hardware acceleration
--ignore-gpu-blocklist

# --- Workarounds ---
# Disable Wayland color manager to prevent color profile issues
--disable-features=WaylandWpColorManagerV1
