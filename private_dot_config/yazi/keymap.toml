[mgr]
prepend_keymap = [
	# Bookmarks (g + key)
	{ on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go to Downloads" },
	{ on = [ "g", "p" ], run = "cd ~/Pictures", desc = "Go to Pictures" },
	{ on = [ "g", "D" ], run = "cd ~/Documents", desc = "Go to Documents" },
	{ on = [ "g", "c" ], run = "cd ~/.config", desc = "Go to config" },
	{ on = [ "g", "l" ], run = "cd ~/.local", desc = "Go to .local" },
	{ on = [ "g", "r" ], run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel 2>/dev/null || echo $PWD)"', desc = "Go to git root" },
	{ on = [ "g", "h" ], run = "cd ~", desc = "Go to home" },

	# Open shell here
	{ on = "!", run = 'shell "$SHELL" --block', desc = "Open shell here" },

	# Copy to clipboard (Wayland)
	{ on = "y", run = [ "shell -- for f in %s; do echo \"file://$f\"; done | wl-copy -t text/uri-list", "yank" ], desc = "Yank to clipboard" },

	# Search with ripgrep
	{ on = "S", run = 'search --via=rg', desc = "Search with rg" },

	# Flat view
	{ on = [ "g", "f" ], run = 'search_do --via=fd --args="-d 3"', desc = "Flat view (depth 3)" },
]

[input]
prepend_keymap = [
	# Make Escape more responsive
	{ on = "<Esc>", run = "close", desc = "Cancel input" },
]
