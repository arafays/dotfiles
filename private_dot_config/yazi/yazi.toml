[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = false
show_symlink = true
scrolloff = 5
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
	{ run = "$EDITOR %s", block = true, for = "unix" },
]
open = [
	{ run = "xdg-open %s", desc = "Open" },
]
reveal = [
	{ run = "xdg-open %d", desc = "Reveal" },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]
play = [
	{ run = "mpv %s", orphan = true, for = "unix" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },
	{ mime = "audio/*", use = "play" },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "application/pdf", use = "open" },
	{ mime = "application/zip", use = "extract" },
	{ mime = "application/gzip", use = "extract" },
	{ mime = "application/x-tar", use = "extract" },
	{ mime = "application/x-bzip2", use = "extract" },
	{ mime = "application/x-7z-compressed", use = "extract" },
	{ url = "*.json", use = "edit" },
	{ url = "*.toml", use = "edit" },
	{ url = "*.yaml", use = "edit" },
	{ url = "*.yml", use = "edit" },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
suppress_preload = false
