scan_timeout = 100
palette = "oxocarbon"
add_newline = true

# default_format = "$all"

# Move the directory to the second line
format = """
[в•ӯ](fg:separator)$directory$all$fill$cmd_duration\
$line_break\
[в•°](fg:separator)$character
"""

continuation_prompt = "у°Ғ” у°Ғ” "

# format = """
# $line_break\
# [в•°](fg:separator)\
# $character\
# """


[palettes.oxocarbon]
black = "#161616"
red = "#ee5396"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
magenta = "#be95ff"
cyan = "#3ddbd9"
white = "#dde1e6"
icon = "#161616"
status = "#e23140"

prompt_ok = "#42be65"
prompt_err = "#e23140"

separator = "#45475A"

background = "#262626"
git_branch = "#ffe97b"

directory = "#dde1e6"
duration = "#ee5396"

[hostname]
ssh_only = true
ssh_symbol = "о¬Ғ "
format = ' on [$hostname](bold yellow) '
trim_at = "."
disabled = false

[character]
success_symbol = "[вқҜ](fg:prompt_ok)"
error_symbol = "[вқҜ](fg:prompt_err)"

[status]
format = "[в”Җ](fg:separator)[оӮ¶](fg:status)[оҪ¶](fg:icon bg:status)[оӮҙ](fg:status bg:background)[ $status](bg:background)[оӮҙ](fg:background) "
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Җ](fg:separator)[оӮ¶](fg:status)[оҪ¶](fg:icon bg:status)[оӮҙ](fg:status bg:background)[ $pipestatus](bg:background)[оӮҙ](fg:background) "
disabled = false

[directory]
read_only = " у°Ңҫ"
format = "[в”Җ](fg:separator)[оӮ¶](fg:directory)[пҒ»](fg:icon bg:directory)[оӮҙ](fg:directory bg:background)[ $path](bg:background)[оӮҙ](fg:background)"
truncate_to_repo = false                                                                                                                       # truncates directory to root folder if in github repo
truncation_length = 3
truncation_symbol = "вҖҰ/"
# repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) '
# repo_root_style = 'underline white'

[cmd_duration]
format = "[оӮ¶](fg:duration)[уұҗӢ](fg:icon bg:duration)[оӮҙ](fg:duration bg:background)[ $duration](bg:background)[оӮҙ](fg:background)"
min_time = 4
show_milliseconds = false

[time]
format = "[в”Җ](fg:separator)[оӮ¶](fg:duration)[у°Ҙ”](fg:icon bg:duration)[оӮҙ](fg:duration bg:background)[ $time](bg:background)[оӮҙ](fg:background) "
disabled = true
time_format = "%H: %M"


[git_branch]
format = "[в”Җ](fg:separator)[оӮ¶](fg:git_branch)[пҗҳ](fg:icon bg:git_branch)[оӮҙ](fg:git_branch bg:background)[ $branch](bg:background)[оӮҙ](fg:background) "
symbol = "пҗҳ "

[git_status]
stashed = ' [пҒ© ${count}](blue)'
modified = ' [п‘ҷ ${count}](yellow)'
ahead = ' [пҒў ${count}](green)'
diverged = ' [п‘ҝ вҮЎ${ahead_count}(green) вҮЈ${behind_count}(red)](bold purple)'
behind = ' [пҒЈ ${count}](red)'
staged = ' [пҒ§ ${count}](green)'
untracked = ' [п„Ё ${count}](red)'

# stashed = "[\\($count\\)](blue)"
# modified = " ! ${count}"
# ahead = 'вҮЎ${count}(red)'
# diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
# behind = 'вҮЈ${count}(red)'
# staged = '[++\($count\)](green)'
# untracked = '[??\($count\)](red)'

[git_commit]
tag_symbol = ' пҗ’ '

