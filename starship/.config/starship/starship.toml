# "$schema" = 'https://starship.rs/config-schema.json'
palette = "oxocarbon"
add_newline = true

[fill]
symbol = ' '

[palettes.oxocarbon]
black = "#161616"
red = "#ee5396"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
magenta = "#be95ff"
cyan = "#3ddbd9"
white = "#dde1e6"

icon = "#161616"
status = "#e23140"

prompt_ok = "#42be65"
prompt_err = "#e23140"

separator = "#45475A"

background = "#262626"
git_branch = "#ffe97b"

directory = "#dde1e6"
duration = "#ee5396"

format = """\
  ≤░μΘ \
  $directory\
  $git_branch$git_commit$git_state $git_status\
  $character\n
"""
continuation_prompt = 'έΨ╢έΨ╢ '


[git_branch]
format = "[ΌΓ╢](fg:git_branch)[ΎΡα](fg:icon bg:git_branch)[ΌΓ┤](fg:git_branch bg:background)[ $branch](bg:background)[ΌΓ┤](fg:background) "
symbol = "ΎΡα "

[git_status]
stashed = ' [ΎΒσ ${count}](blue)'
modified = ' [ΎΣβ ${count}](yellow)'
ahead = ' [ΎΒλ ${count}](green)'
diverged = ' [ΎΣ┐ έΘκ${ahead_count}(green) έΘμ${behind_count}(red)](bold purple)'
behind = ' [ΎΒμ ${count}](red)'
staged = ' [ΎΒπ ${count}](green)'
untracked = ' [ΎΕρ ${count}](red)'

# stashed = "[\\($count\\)](blue)"
# modified = " ! ${count}"
# ahead = 'έΘκ${count}(red)'
# diverged = 'έΘΧέΘκ${ahead_count}έΘμ${behind_count}'
# behind = 'έΘμ${count}(red)'
# staged = '[++\($count\)](green)'
# untracked = '[??\($count\)](red)'

[git_commit]
tag_symbol = ' ΎΡΤ '

